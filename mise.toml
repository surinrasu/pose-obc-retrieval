#:schema https://mise.jdx.dev/schema/mise.json
min_version = "2024.1.1"

[tools]
rust = { version = "latest", components = "cargo,rust-analyzer" }

[tasks.build]
description = "Build the CLI"
alias = "b"
depends = ["check:models:spinepose"]
sources = ["Cargo.toml", "Cargo.lock", "build.rs", "src/**/*.rs"]
outputs = ["target/debug/pose-obc-retrieval"]
run = "cargo build"

[tasks.check]
description = "Run cargo check"
depends = ["check:data:spinepose"]
sources = ["Cargo.toml", "Cargo.lock", "build.rs", "src/**/*.rs"]
run = "cargo check"

[tasks."fmt:check"]
description = "Check Rust formatting"
sources = ["Cargo.toml", "Cargo.lock", "build.rs", "src/**/*.rs", "tests/**/*.rs"]
run = "cargo fmt --check"

[tasks.clippy]
description = "Run Clippy with warnings denied"
depends = ["check:data:spinepose"]
sources = ["Cargo.toml", "Cargo.lock", "build.rs", "src/**/*.rs", "tests/**/*.rs"]
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
description = "Run Rust tests"
alias = "t"
depends = ["check:data:spinepose"]
run = "cargo test"

[tasks.ci]
description = "Run local CI checks"
depends = ["fmt:check", "clippy", "check", "test"]

[tasks."data:spinepose"]
description = "Download SpinePose ONNX models used by the Burn runtime"
sources = ["mise.toml"]
outputs = [
  "{{ env.SPINEPOSE_MODEL_DIR | default(value='assets/models/spinepose') }}/rfdetr_m_v142_576x576.onnx",
  "{{ env.SPINEPOSE_MODEL_DIR | default(value='assets/models/spinepose') }}/spinepose-l_32xb256-10e_simspine-256x192.onnx",
]
run = '''
set -eu

MODEL_DIR="${SPINEPOSE_MODEL_DIR:-assets/models/spinepose}"
mkdir -p "${MODEL_DIR}"

download_if_missing() {
  url="$1"
  dst="$2"

  if [ -s "${dst}" ]; then
    echo "Keeping existing ${dst}"
    return
  fi

  tmp="${dst}.tmp"
  rm -f "${tmp}"
  curl -fL "${url}" -o "${tmp}"
  mv "${tmp}" "${dst}"
}

download_if_missing \
  "https://huggingface.co/saifkhichi96/opendetect/resolve/main/rfdetr/rfdetr_m_v142_576x576.onnx" \
  "${MODEL_DIR}/rfdetr_m_v142_576x576.onnx"
download_if_missing \
  "https://huggingface.co/dfki-av/spinepose/resolve/main/spinepose-l_32xb256-10e_simspine-256x192.onnx" \
  "${MODEL_DIR}/spinepose-l_32xb256-10e_simspine-256x192.onnx"

echo "SpinePose ONNX models are ready under ${MODEL_DIR}"
'''

[tasks."data:spinepose:convert"]
description = "Convert local SpinePose ONNX models to Burn source and burnpack files"
depends = ["data:spinepose"]
tools = { "cargo:burn-onnx" = "0.21.0" }
sources = [
  "{{ env.SPINEPOSE_MODEL_DIR | default(value='assets/models/spinepose') }}/rfdetr_m_v142_576x576.onnx",
  "{{ env.SPINEPOSE_MODEL_DIR | default(value='assets/models/spinepose') }}/spinepose-l_32xb256-10e_simspine-256x192.onnx",
]
outputs = [
  "{{ env.SPINEPOSE_BURN_DIR | default(value='target/generated/spinepose') }}/rfdetr_m_v142_576x576.rs",
  "{{ env.SPINEPOSE_BURN_DIR | default(value='target/generated/spinepose') }}/rfdetr_m_v142_576x576.bpk",
  "{{ env.SPINEPOSE_BURN_DIR | default(value='target/generated/spinepose') }}/spinepose-l_32xb256-10e_simspine-256x192.rs",
  "{{ env.SPINEPOSE_BURN_DIR | default(value='target/generated/spinepose') }}/spinepose-l_32xb256-10e_simspine-256x192.bpk",
]
run = '''
set -eu

MODEL_DIR="${SPINEPOSE_MODEL_DIR:-assets/models/spinepose}"
BURN_DIR="${SPINEPOSE_BURN_DIR:-target/generated/spinepose}"
mkdir -p "${BURN_DIR}"

onnx2burn "${MODEL_DIR}/rfdetr_m_v142_576x576.onnx" "${BURN_DIR}" --no-development
onnx2burn "${MODEL_DIR}/spinepose-l_32xb256-10e_simspine-256x192.onnx" "${BURN_DIR}" --no-development

echo "SpinePose Burn artifacts are ready under ${BURN_DIR}"
echo "Use them with: SPINEPOSE_BURN_DIR=${BURN_DIR} cargo build"
'''

[tasks."check:data:spinepose"]
description = "Check SpinePose ONNX model files"
hide = true
run = '''
set -eu

MODEL_DIR="${SPINEPOSE_MODEL_DIR:-assets/models/spinepose}"
for model in \
  "rfdetr_m_v142_576x576.onnx" \
  "spinepose-l_32xb256-10e_simspine-256x192.onnx"
do
  if [ ! -s "${MODEL_DIR}/${model}" ]; then
    echo "Missing ${MODEL_DIR}/${model}"
    echo "Run: mise run data:spinepose"
    exit 1
  fi
done
'''

[tasks."assets:retrieval"]
description = "Update local front-end assets for retrieval"
sources = ["mise.toml"]
outputs = [
  "{{ env.ASSET_DIR | default(value='assets') }}/beer.min.css",
  "{{ env.ASSET_DIR | default(value='assets') }}/beer.min.js",
  "{{ env.ASSET_DIR | default(value='assets') }}/material-symbols.css",
  "{{ env.ASSET_DIR | default(value='assets') }}/material-symbols-outlined.ttf",
]
run = '''
set -eu

ASSET_DIR="${ASSET_DIR:-assets}"
MATERIAL_FONT_URL="https://fonts.gstatic.com/s/materialsymbolsoutlined/v338/kJF1BvYX7BgnkSrUwT8OhrdQw4oELdPIeeII9v6oDMzByHX9rA6RzaxHMPdY43zj-jCxv3fzvRNU22ZXGJpEpjC_1v-p_4MrImHCIJIZrDCvHOem.ttf"

mkdir -p "${ASSET_DIR}"
curl -fL -o "${ASSET_DIR}/beer.min.css" "https://cdn.jsdelivr.net/npm/beercss/dist/cdn/beer.min.css"
curl -fL -o "${ASSET_DIR}/beer.min.js" "https://cdn.jsdelivr.net/npm/beercss/dist/cdn/beer.min.js"
curl -fL -o "${ASSET_DIR}/material-symbols-outlined.ttf" "${MATERIAL_FONT_URL}"

cat > "${ASSET_DIR}/material-symbols.css" <<'CSS'
@font-face {
  font-family: "Material Symbols Outlined";
  font-style: normal;
  font-weight: 400;
  src: url("/assets/material-symbols-outlined.ttf") format("truetype");
}

.material-symbols-outlined {
  direction: ltr;
  display: inline-block;
  font-family: "Material Symbols Outlined";
  font-size: 24px;
  font-style: normal;
  font-weight: normal;
  letter-spacing: normal;
  line-height: 1;
  text-transform: none;
  white-space: nowrap;
  word-wrap: normal;
}
CSS
'''

[tasks."data:coco2017"]
description = "Download COCO 2017 dataset"
sources = ["mise.toml"]
outputs = [
  "{{ env.DATA_DIR | default(value='data/coco') }}/.mise-coco2017-ready",
]
run = '''
set -eu

DATA_DIR="${DATA_DIR:-data/coco}"
COCO2017_URL="${COCO2017_URL:-https://www.kaggle.com/api/v1/datasets/download/awsaf49/coco-2017-dataset}"
DOWNLOAD_DIR="${DATA_DIR}/.coco2017-download"
ARCHIVE_PATH="${DOWNLOAD_DIR}/coco2017.zip"
PARTIAL_PATH="${ARCHIVE_PATH}.part"
COMPLETE_PATH="${ARCHIVE_PATH}.complete"

mkdir -p "${DATA_DIR}" "${DOWNLOAD_DIR}"

if [ ! -s "${ARCHIVE_PATH}" ] || [ ! -e "${COMPLETE_PATH}" ]; then
  echo "Downloading COCO 2017 from ${COCO2017_URL}..."
  curl -fL --retry 3 --retry-delay 5 -C - -o "${PARTIAL_PATH}" "${COCO2017_URL}"
  mv "${PARTIAL_PATH}" "${ARCHIVE_PATH}"
  touch "${COMPLETE_PATH}"
else
  echo "Keeping existing ${ARCHIVE_PATH}"
fi

echo "Extracting ${ARCHIVE_PATH}..."
unzip -q -o "${ARCHIVE_PATH}" -d "${DOWNLOAD_DIR}"

COCO_ROOT=""
for candidate in \
  "${DOWNLOAD_DIR}/coco2017" \
  "${DOWNLOAD_DIR}/coco-2017-dataset/coco2017" \
  "${DOWNLOAD_DIR}"
do
  if [ -d "${candidate}/annotations" ] && { [ -d "${candidate}/train2017" ] || [ -d "${candidate}/images/train2017" ]; }; then
    COCO_ROOT="${candidate}"
    break
  fi
done

if [ -z "${COCO_ROOT}" ]; then
  echo "Downloaded data did not contain a recognizable COCO 2017 layout."
  echo "Expected annotations plus train2017/val2017 under ${DOWNLOAD_DIR}."
  exit 1
fi

IMAGE_ROOT="${COCO_ROOT}"
if [ -d "${COCO_ROOT}/images/train2017" ]; then
  IMAGE_ROOT="${COCO_ROOT}/images"
fi

place_dir() {
  src="$1"
  dst="$2"

  if [ -d "${dst}" ]; then
    echo "Keeping existing ${dst}"
    return
  fi

  if [ ! -d "${src}" ]; then
    echo "Missing expected directory: ${src}"
    exit 1
  fi

  mv "${src}" "${dst}"
}

place_dir "${IMAGE_ROOT}/train2017" "${DATA_DIR}/train2017"
place_dir "${IMAGE_ROOT}/val2017" "${DATA_DIR}/val2017"
place_dir "${COCO_ROOT}/annotations" "${DATA_DIR}/annotations"

for required in \
  "${DATA_DIR}/train2017" \
  "${DATA_DIR}/val2017" \
  "${DATA_DIR}/annotations/person_keypoints_train2017.json" \
  "${DATA_DIR}/annotations/person_keypoints_val2017.json"
do
  if [ ! -e "${required}" ]; then
    echo "Missing required COCO file or directory: ${required}"
    exit 1
  fi
done

touch "${DATA_DIR}/.mise-coco2017-ready"

echo "COCO 2017 is ready under ${DATA_DIR}"
echo "Train with:"
echo "  mise run train:coco2017"
'''

[tasks."data:coco2017:generate-pose37"]
description = "Generate SpinePose v2 large 37-keypoint JSON files for COCO 2017"
depends = ["check:data:coco2017"]
tools = { "pipx:spinepose" = "latest" }
run = '''
set -eu

DATA_DIR="${DATA_DIR:-data/coco}"
OUT_DIR="${OUT_DIR:-data/coco-37}"
SPINEPOSE_HOME="${SPINEPOSE_HOME:-${PWD}/.spinepose-home}"
MODE="${MODE:-large}"
MODEL_VERSION="${MODEL_VERSION:-v2}"
DETECTOR="${DETECTOR:-rfdetr}"
DEVICE="${DEVICE:-cpu}"
SPLIT="${SPLIT:-all}"
OVERWRITE="${OVERWRITE:-0}"
LIMIT="${LIMIT:-}"

mkdir -p "${OUT_DIR}/annotations" "${OUT_DIR}/poses"

link_or_keep() {
  src="$1"
  dst="$2"

  if [ -e "${dst}" ] || [ -L "${dst}" ]; then
    echo "Keeping existing ${dst}"
    return
  fi

  case "${src}" in
    /*) abs_src="${src}" ;;
    *) abs_src="${PWD}/${src}" ;;
  esac

  ln -s "${abs_src}" "${dst}"
}

link_or_keep "${DATA_DIR}/train2017" "${OUT_DIR}/train2017"
link_or_keep "${DATA_DIR}/val2017" "${OUT_DIR}/val2017"
cp "${DATA_DIR}/annotations/person_keypoints_train2017.json" "${OUT_DIR}/annotations/person_keypoints_train2017.json"
cp "${DATA_DIR}/annotations/person_keypoints_val2017.json" "${OUT_DIR}/annotations/person_keypoints_val2017.json"

SPINEPOSE_BIN="$(command -v spinepose || true)"
if [ -z "${SPINEPOSE_BIN}" ]; then
  echo "Missing spinepose executable."
  echo "Run this task through mise so pipx:spinepose is active: mise run data:coco2017:generate-pose37"
  exit 1
fi
SPINEPOSE_LINK="$(readlink "${SPINEPOSE_BIN}" || true)"
if [ -z "${SPINEPOSE_LINK}" ]; then
  SPINEPOSE_LINK="${SPINEPOSE_BIN}"
fi
PYTHON_BIN="$(dirname "${SPINEPOSE_LINK}")/python"

if [ ! -x "${PYTHON_BIN}" ]; then
  echo "Missing pipx spinepose Python interpreter: ${PYTHON_BIN}"
  echo "Run this task through mise so pipx:spinepose is active: mise run data:coco2017:generate-pose37"
  exit 1
fi

env HOME="${SPINEPOSE_HOME}" "${PYTHON_BIN}" - \
  "${DATA_DIR}" \
  "${OUT_DIR}" \
  "${MODE}" \
  "${MODEL_VERSION}" \
  "${DETECTOR}" \
  "${DEVICE}" \
  "${SPLIT}" \
  "${OVERWRITE}" \
  "${LIMIT}" <<'PY'
import json
import sys
from pathlib import Path

import cv2
import numpy as np
from tqdm import tqdm

from spinepose import SpinePoseEstimator


EXPECTED_KEYPOINTS = 37


def enabled(value):
    return str(value).lower() in {"1", "true", "yes", "on"}


def output_path_for(out_root, split, image_file_name):
    return out_root / "poses" / split / f"{Path(image_file_name).stem}.json"


def split_specs(requested):
    requested = requested.lower()
    specs = {
        "train": [("train2017", "person_keypoints_train2017.json")],
        "train2017": [("train2017", "person_keypoints_train2017.json")],
        "val": [("val2017", "person_keypoints_val2017.json")],
        "val2017": [("val2017", "person_keypoints_val2017.json")],
        "all": [
            ("train2017", "person_keypoints_train2017.json"),
            ("val2017", "person_keypoints_val2017.json"),
        ],
    }
    if requested not in specs:
        raise SystemExit(f"SPLIT must be one of: {', '.join(sorted(specs))}")
    return specs[requested]


def load_coco_images(data_root, split, annotation_file):
    annotation_path = data_root / "annotations" / annotation_file
    with annotation_path.open() as f:
        coco = json.load(f)

    images_by_id = {image["id"]: image for image in coco.get("images", [])}
    annotated_image_ids = set()
    for annotation in coco.get("annotations", []):
        if annotation.get("iscrowd", 0):
            continue
        if annotation.get("category_id", 1) != 1:
            continue
        keypoints = annotation.get("keypoints") or []
        has_keypoints = annotation.get("num_keypoints", 0) > 0 or any(
            point[2] > 0 for point in zip(*[iter(keypoints)] * 3)
        )
        if has_keypoints:
            annotated_image_ids.add(annotation["image_id"])

    if not annotated_image_ids:
        annotated_image_ids = set(images_by_id)

    images = []
    for image_id in sorted(annotated_image_ids):
        image = images_by_id.get(image_id)
        if not image:
            continue
        image_path = data_root / split / image["file_name"]
        if image_path.is_file():
            images.append((split, image["file_name"], image_path))
    return images


def write_openpose_json(results, output_path):
    people = []
    if results.size > 0:
        for person in results:
            people.append({"pose_keypoints_2d": person.reshape(-1).tolist()})

    output_path.parent.mkdir(parents=True, exist_ok=True)
    with output_path.open("w") as f:
        json.dump({"version": 1.0, "people": people}, f)


def estimate_image(estimator, image_path):
    image = cv2.imread(str(image_path), cv2.IMREAD_COLOR)
    if image is None:
        raise ValueError(f"Cannot read image: {image_path}")

    keypoints, scores = estimator(image)
    if len(keypoints) == 0:
        return np.array([])

    keypoints = np.asarray(keypoints)
    scores = np.asarray(scores)
    if keypoints.shape[1] != EXPECTED_KEYPOINTS:
        raise ValueError(
            f"expected {EXPECTED_KEYPOINTS} SpinePose keypoints, got {keypoints.shape[1]}"
        )

    return np.concatenate([keypoints, scores[..., np.newaxis]], axis=-1)


def write_ready_marker(out_root, mode, model_version, detector):
    (out_root / ".mise-coco37-ready").write_text(
        f"mode={mode}\nmodel_version={model_version}\ndetector={detector}\n"
    )


data_root = Path(sys.argv[1])
out_root = Path(sys.argv[2])
mode = sys.argv[3]
model_version = sys.argv[4]
detector = sys.argv[5]
device = sys.argv[6]
requested_split = sys.argv[7]
overwrite = enabled(sys.argv[8])
limit = int(sys.argv[9]) if sys.argv[9] else None

images = []
for split, annotation_file in split_specs(requested_split):
    images.extend(load_coco_images(data_root, split, annotation_file))

pending = [
    item
    for item in images
    if overwrite or not output_path_for(out_root, item[0], item[1]).is_file()
]
if limit is not None:
    pending = pending[:limit]

print(f"images={len(images)} pending={len(pending)} out={out_root}")
if not pending:
    if limit is None:
        write_ready_marker(out_root, mode, model_version, detector)
    raise SystemExit(0)

estimator = SpinePoseEstimator(
    mode=mode,
    backend="onnxruntime",
    device=device,
    detector=detector,
    model_version=model_version,
)

failures = []
for split, image_file_name, image_path in tqdm(pending, desc="coco-spinepose"):
    try:
        write_openpose_json(
            estimate_image(estimator, image_path),
            output_path_for(out_root, split, image_file_name),
        )
    except Exception as exc:
        failures.append(
            {
                "split": split,
                "image": image_file_name,
                "path": str(image_path),
                "error": str(exc),
            }
        )

if failures:
    failure_path = out_root / "spinepose_failures.json"
    with failure_path.open("w") as f:
        json.dump(failures, f, indent=2)
    raise SystemExit(f"{len(failures)} failures written to {failure_path}")

if limit is None:
    write_ready_marker(out_root, mode, model_version, detector)
PY

echo "COCO-37 pose JSON is ready under ${OUT_DIR}"
'''

[tasks."data:pose-obc"]
description = "Unpack the Git LFS pose-obc retrieval dataset"
sources = ["mise.toml"]
outputs = [
  "{{ env.DATA_DIR | default(value='data/pose-obc') }}/.mise-pose-obc-ready",
]
run = '''
set -eu

DATA_DIR="${DATA_DIR:-data/pose-obc}"
PACKED_DIR="${PACKED_DIR:-data/pose-obc-packed}"

git lfs pull --include "${PACKED_DIR}/**"

cargo run --release -- dataset unpack \
  --packed-root "${PACKED_DIR}" \
  --output-root "${DATA_DIR}" \
  --force

found_data=0
for persona_dir in "${DATA_DIR}"/persona_*; do
  if [ -d "${persona_dir}/images" ] && [ -d "${persona_dir}/glyphs" ]; then
    found_data=1
    break
  fi
done

if [ "${found_data}" -eq 0 ]; then
  echo "Unpacked data did not contain a recognizable pose-obc retrieval layout."
  echo "Expected persona_*/images and persona_*/glyphs under ${DATA_DIR}."
  exit 1
fi

touch "${DATA_DIR}/.mise-pose-obc-ready"

echo "pose-obc retrieval data is ready under ${DATA_DIR}"
echo "Train with:"
echo "  mise run train:retrieval"
'''

[tasks."data:pose-obc:pack"]
description = "Pack local pose-obc persona directories into Git LFS AVIF/JSONL files"
depends = ["check:data:pose-obc"]
run = '''
set -eu

DATA_ROOT="${DATA_ROOT:-data/pose-obc}"
PACKED_ROOT="${PACKED_ROOT:-data/pose-obc-packed}"

cargo run --release -- dataset pack \
  --data-root "${DATA_ROOT}" \
  --output-root "${PACKED_ROOT}" \
  --force \
  "$@"
'''

[tasks."data:pose-obc:verify"]
description = "Verify packed pose-obc AVIF/JSONL files"
run = '''
set -eu

PACKED_ROOT="${PACKED_ROOT:-data/pose-obc-packed}"

cargo run --release -- dataset verify \
  --packed-root "${PACKED_ROOT}" \
  "$@"
'''

[tasks."data:pose-obc:generate-pose"]
description = "Generate 37-keypoint pose JSON files for pose-obc"
depends = ["check:data:pose-obc"]
tools = { "pipx:spinepose" = "latest" }
run = '''
set -eu

DATA_ROOT="${DATA_ROOT:-data/pose-obc}"
SPINEPOSE_HOME="${SPINEPOSE_HOME:-${PWD}/.spinepose-home}"
MODE="${MODE:-large}"
MODEL_VERSION="${MODEL_VERSION:-v2}"
DETECTOR="${DETECTOR:-rfdetr}"
DEVICE="${DEVICE:-cpu}"
OVERWRITE="${OVERWRITE:-0}"
LIMIT="${LIMIT:-}"

SPINEPOSE_BIN="$(command -v spinepose || true)"
if [ -z "${SPINEPOSE_BIN}" ]; then
  echo "Missing spinepose executable."
  echo "Run this task through mise so pipx:spinepose is active: mise run data:pose-obc:generate-pose"
  exit 1
fi
SPINEPOSE_LINK="$(readlink "${SPINEPOSE_BIN}" || true)"
if [ -z "${SPINEPOSE_LINK}" ]; then
  SPINEPOSE_LINK="${SPINEPOSE_BIN}"
fi
PYTHON_BIN="$(dirname "${SPINEPOSE_LINK}")/python"

if [ ! -x "${PYTHON_BIN}" ]; then
  echo "Missing pipx spinepose Python interpreter: ${PYTHON_BIN}"
  echo "Run this task through mise so pipx:spinepose is active: mise run data:pose-obc:generate-pose"
  exit 1
fi

env HOME="${SPINEPOSE_HOME}" "${PYTHON_BIN}" - \
  "${DATA_ROOT}" \
  "${MODE}" \
  "${MODEL_VERSION}" \
  "${DETECTOR}" \
  "${DEVICE}" \
  "${OVERWRITE}" \
  "${LIMIT}" <<'PY'
import json
import sys
from pathlib import Path

import cv2
import numpy as np
from tqdm import tqdm

from spinepose import SpinePoseEstimator


def enabled(value):
    return str(value).lower() in {"1", "true", "yes", "on"}


def output_path_for(image_path):
    return image_path.parent.parent / "poses" / f"{image_path.stem}.json"


def write_openpose_json(results, output_path):
    people = []
    if results.size > 0:
        for person in results:
            people.append({"pose_keypoints_2d": person.reshape(-1).tolist()})

    output_path.parent.mkdir(parents=True, exist_ok=True)
    with output_path.open("w") as f:
        json.dump({"version": 1.0, "people": people}, f)


def estimate_image(estimator, image_path):
    image = cv2.imread(str(image_path), cv2.IMREAD_COLOR)
    if image is None:
        raise ValueError(f"Cannot read image: {image_path}")

    keypoints, scores = estimator(image)
    if len(keypoints) == 0:
        return np.array([])
    return np.concatenate([keypoints, scores[..., np.newaxis]], axis=-1)


data_root = Path(sys.argv[1])
mode = sys.argv[2]
model_version = sys.argv[3]
detector = sys.argv[4]
device = sys.argv[5]
overwrite = enabled(sys.argv[6])
limit = int(sys.argv[7]) if sys.argv[7] else None

images = sorted(data_root.glob("persona_*/images/*.png"))
if not images:
    raise SystemExit(f"No images found under {data_root}/persona_*/images")

pending = [
    path
    for path in images
    if overwrite or not output_path_for(path).is_file()
]
if limit is not None:
    pending = pending[:limit]

print(f"images={len(images)} pending={len(pending)}")
if not pending:
    raise SystemExit(0)

estimator = SpinePoseEstimator(
    mode=mode,
    backend="onnxruntime",
    device=device,
    detector=detector,
    model_version=model_version,
)

failures = []
for image_path in tqdm(pending, desc="spinepose"):
    try:
        write_openpose_json(
            estimate_image(estimator, image_path),
            output_path_for(image_path),
        )
    except Exception as exc:
        failures.append((str(image_path), str(exc)))

if failures:
    failure_path = data_root / "spinepose_failures.json"
    with failure_path.open("w") as f:
        json.dump(failures, f, indent=2)
    raise SystemExit(f"{len(failures)} failures written to {failure_path}")
PY
'''

[tasks."check:data:coco2017"]
description = "Check COCO 2017 dataset files"
hide = true
run = '''
set -eu

DATA_DIR="${DATA_DIR:-data/coco}"

for required in \
  "${DATA_DIR}/train2017" \
  "${DATA_DIR}/val2017" \
  "${DATA_DIR}/annotations/person_keypoints_train2017.json" \
  "${DATA_DIR}/annotations/person_keypoints_val2017.json"
do
  if [ ! -e "${required}" ]; then
    echo "Missing required COCO file or directory: ${required}"
    echo "Run first: mise run data:coco2017"
    exit 1
  fi
done
'''

[tasks."check:data:coco37"]
description = "Check COCO 2017 plus SpinePose 37-keypoint JSON files"
hide = true
run = '''
set -eu

DATA_DIR="${DATA_DIR:-data/coco-37}"

for required in \
  "${DATA_DIR}/train2017" \
  "${DATA_DIR}/val2017" \
  "${DATA_DIR}/annotations/person_keypoints_train2017.json" \
  "${DATA_DIR}/annotations/person_keypoints_val2017.json" \
  "${DATA_DIR}/poses/train2017" \
  "${DATA_DIR}/poses/val2017"
do
  if [ ! -e "${required}" ]; then
    echo "Missing required COCO-37 file or directory: ${required}"
    echo "Run first: DATA_DIR=data/coco OUT_DIR=${DATA_DIR} mise run data:coco2017:generate-pose37"
    exit 1
  fi
done
'''

[tasks."check:data:pose-obc"]
description = "Check pose-obc retrieval data"
hide = true
run = '''
set -eu

DATA_ROOT="${DATA_ROOT:-data/pose-obc}"

found_data=0
for persona_dir in "${DATA_ROOT}"/persona_*; do
  if [ -d "${persona_dir}/images" ] && [ -d "${persona_dir}/glyphs" ]; then
    found_data=1
    break
  fi
done

if [ "${found_data}" -eq 0 ]; then
  echo "Missing pose-obc retrieval data under ${DATA_ROOT}."
  echo "Run first: mise run data:pose-obc"
  exit 1
fi
'''

[tasks."check:model:retrieval"]
description = "Check retrieval model file"
hide = true
run = '''
set -eu

MODEL="${MODEL:-runs/retrieval/last.mpk}"

if [ ! -f "${MODEL}" ] && [ ! -f "${MODEL%.mpk}.mpk" ]; then
  echo "Missing retrieval model: ${MODEL}"
  echo "Run first: mise run train:retrieval"
  exit 1
fi
'''

[tasks."check:retrieval:index"]
description = "Check retrieval index file"
hide = true
run = '''
set -eu

INDEX="${INDEX:-runs/retrieval/glyph_index.json}"

if [ ! -f "${INDEX}" ]; then
  echo "Missing retrieval index: ${INDEX}"
  echo "Run first: mise run retrieval:index"
  exit 1
fi
'''

[tasks."train:coco2017"]
description = "Train Lite-HRNet on COCO 2017 with SpinePose 37-keypoint labels"
depends = ["check:data:coco37"]
run = '''
set -eu

DATA_DIR="${DATA_DIR:-data/coco-37}"
OUTPUT_DIR="${OUTPUT_DIR:-runs/coco37}"

cargo run --release -- train pose \
  --annotations "${DATA_DIR}/annotations/person_keypoints_train2017.json" \
  --images "${DATA_DIR}/train2017" \
  --pose-dir "${DATA_DIR}/poses/train2017" \
  --validation-annotations "${DATA_DIR}/annotations/person_keypoints_val2017.json" \
  --validation-images "${DATA_DIR}/val2017" \
  --validation-pose-dir "${DATA_DIR}/poses/val2017" \
  --output-dir "${OUTPUT_DIR}" \
  "$@"
'''

[tasks."train:retrieval"]
description = "Train retrieval on surinrasu/pose-obc"
depends = ["check:data:pose-obc"]
run = '''
set -eu

DATA_ROOT="${DATA_ROOT:-data/pose-obc}"
OUTPUT_DIR="${OUTPUT_DIR:-runs/retrieval}"

cargo run --release -- train retrieval \
  --data-root "${DATA_ROOT}" \
  --output-dir "${OUTPUT_DIR}" \
  "$@"
'''

[tasks."train:retrieval:metal"]
description = "Train retrieval on surinrasu/pose-obc with Metal"
depends = ["check:data:pose-obc"]
run = '''
set -eu

DATA_ROOT="${DATA_ROOT:-data/pose-obc}"
OUTPUT_DIR="${OUTPUT_DIR:-runs/retrieval}"

cargo run --release --features metal -- train retrieval \
  --backend metal \
  --data-root "${DATA_ROOT}" \
  --output-dir "${OUTPUT_DIR}" \
  "$@"
'''

[tasks."retrieval:index"]
description = "Build retrieval glyph index"
depends = ["check:data:pose-obc", "check:model:retrieval"]
sources = [
  "{{ env.DATA_ROOT | default(value='data/pose-obc') }}/persona_*/glyphs/*.avif",
  "{{ env.DATA_ROOT | default(value='data/pose-obc') }}/persona_*/glyphs/*.png",
  "{{ env.MODEL | default(value='runs/retrieval/last.mpk') }}",
]
outputs = ["{{ env.INDEX | default(value='runs/retrieval/glyph_index.json') }}"]
run = '''
set -eu

DATA_ROOT="${DATA_ROOT:-data/pose-obc}"
MODEL="${MODEL:-runs/retrieval/last.mpk}"
INDEX="${INDEX:-runs/retrieval/glyph_index.json}"

index_dir="${INDEX%/*}"
if [ "${index_dir}" != "${INDEX}" ] && [ -n "${index_dir}" ]; then
  mkdir -p "${index_dir}"
fi

cargo run --release -- index \
  --data-root "${DATA_ROOT}" \
  --model "${MODEL}" \
  --output "${INDEX}" \
  "$@"
'''

[tasks."retrieval:search"]
description = "Search retrieval index with an image or sample"
depends = ["check:data:pose-obc", "check:model:retrieval", "check:retrieval:index"]
run = '''
set -eu

DATA_ROOT="${DATA_ROOT:-data/pose-obc}"
MODEL="${MODEL:-runs/retrieval/last.mpk}"
INDEX="${INDEX:-runs/retrieval/glyph_index.json}"
TOP_K="${TOP_K:-8}"

if [ -n "${IMAGE:-}" ]; then
  cargo run --release -- search \
    --data-root "${DATA_ROOT}" \
    --model "${MODEL}" \
    --index "${INDEX}" \
    --image "${IMAGE}" \
    --top-k "${TOP_K}" \
    "$@"
elif [ -n "${SAMPLE:-}" ]; then
  cargo run --release -- search \
    --data-root "${DATA_ROOT}" \
    --model "${MODEL}" \
    --index "${INDEX}" \
    --sample "${SAMPLE}" \
    --top-k "${TOP_K}" \
    "$@"
elif [ "$#" -gt 0 ]; then
  cargo run --release -- search \
    --data-root "${DATA_ROOT}" \
    --model "${MODEL}" \
    --index "${INDEX}" \
    "$@"
else
  echo "Set IMAGE=/path/to/query.avif, SAMPLE=0, or pass search arguments."
  exit 1
fi
'''

[tasks."serve:retrieval"]
description = "Serve retrieval UI"
depends = ["check:data:pose-obc", "check:model:retrieval"]
run = '''
set -eu

DATA_ROOT="${DATA_ROOT:-data/pose-obc}"
MODEL="${MODEL:-runs/retrieval/last.mpk}"
INDEX="${INDEX:-runs/retrieval/glyph_index.json}"
ADDR="${ADDR:-127.0.0.1:8080}"
TOP_K="${TOP_K:-8}"
BACKEND="${BACKEND:-flex}"
LIVE="${LIVE:-0}"
LIVE_ARGS=""
if [ "${LIVE}" = "1" ] || [ "${LIVE}" = "true" ]; then
  LIVE_ARGS="--live"
fi
CARGO_ARGS="--release"
if [ "${BACKEND}" = "metal" ]; then
  CARGO_ARGS="--release --features metal"
fi

if [ -f "${INDEX}" ]; then
  cargo run ${CARGO_ARGS} -- serve \
    --backend "${BACKEND}" \
    --data-root "${DATA_ROOT}" \
    --model "${MODEL}" \
    --index "${INDEX}" \
    --addr "${ADDR}" \
    --top-k "${TOP_K}" \
    ${LIVE_ARGS} \
    "$@"
else
  echo "Retrieval index not found at ${INDEX}; serving will build candidates in memory."
  cargo run ${CARGO_ARGS} -- serve \
    --backend "${BACKEND}" \
    --data-root "${DATA_ROOT}" \
    --model "${MODEL}" \
    --addr "${ADDR}" \
    --top-k "${TOP_K}" \
    ${LIVE_ARGS} \
    "$@"
fi
'''

[tasks."serve:retrieval:metal"]
description = "Serve retrieval UI with Metal"
run = [{ task = "serve:retrieval", env = { BACKEND = "metal" } }]

[tasks."serve:retrieval:live"]
description = "Serve retrieval UI with live video input"
run = [{ task = "serve:retrieval", env = { LIVE = "1" } }]

[tasks."serve:retrieval:live:metal"]
description = "Serve retrieval UI with live video input and Metal"
run = [{ task = "serve:retrieval", env = { BACKEND = "metal", LIVE = "1" } }]

[tasks."train:coco2017:metal"]
