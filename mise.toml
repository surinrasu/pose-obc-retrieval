depends = ["check:data:coco37"]
run = '''
set -eu

DATA_DIR="${DATA_DIR:-data/coco-37}"
OUTPUT_DIR="${OUTPUT_DIR:-runs/coco37}"

cargo run --release --features metal -- train pose \
  --backend metal \
  --annotations "${DATA_DIR}/annotations/person_keypoints_train2017.json" \
  --images "${DATA_DIR}/train2017" \
  --pose-dir "${DATA_DIR}/poses/train2017" \
  --validation-annotations "${DATA_DIR}/annotations/person_keypoints_val2017.json" \
  --validation-images "${DATA_DIR}/val2017" \
  --validation-pose-dir "${DATA_DIR}/poses/val2017" \
  --output-dir "${OUTPUT_DIR}" \
  "$@"
'''
